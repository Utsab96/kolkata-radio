<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Station - Professional UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0a1a;
            --card-bg: #161b2a;
            --tab-bg: #0a0d16;
            --accent: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: radial-gradient(circle at center, #1a122b 0%, #0f0a1a 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        nav {
            width: 100%;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .hamburger {
            display: none;
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        header { width: 100%; padding: 30px 20px 10px; text-align: center; }
        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            display: flex;
            gap: 25px;
            max-width: 1100px;
            width: 100%;
            padding: 0 20px 40px;
            justify-content: center;
            align-items: stretch;
        }

        .browse-card {
            background: var(--card-bg);
            border-radius: 28px;
            width: 450px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            min-height: 650px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tabs { display: flex; background: var(--tab-bg); border-radius: 12px; padding: 5px; margin: 20px 0; }
        .tab { flex: 1; padding: 10px; text-align: center; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; border-radius: 9px; }
        .tab.active { background: var(--accent); color: white; }

        .station-list { flex: 1; overflow-y: auto; }
        .station-item {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            background: rgba(255,255,255,0.03); border-radius: 18px;
            margin-bottom: 10px; cursor: pointer; border: 1px solid transparent;
        }
        .station-item.active { border-color: #7c3aed; background: rgba(124, 58, 237, 0.1); }

        /* Player UI */
        .player-card {
            width: 400px;
            background: var(--accent);
            border-radius: 35px;
            padding: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 700px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .visualizer {
            width: 220px; height: 220px;
            background: #0a0d16;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 8px solid rgba(255,255,255,0.1);
        }

        /* CD Shimmer Overlay */
        .visualizer::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: conic-gradient(transparent, rgba(255,255,255,0.08) 15%, transparent 30%, transparent 65%, rgba(255,255,255,0.08) 80%, transparent 100%);
            border-radius: 50%;
        }

        @keyframes rotateCD { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .playing .visualizer { animation: rotateCD 3s linear infinite; }

        /* Professional Volume Control */
        .volume-section {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .vol-icon {
            width: 20px;
            height: 20px;
            fill: white;
            opacity: 0.8;
        }

        input[type="range"] {
            -webkit-appearance: none;
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .playing-bars { height: 25px; display: flex; align-items: flex-end; gap: 4px; visibility: hidden; }
        .playing .playing-bars { visibility: visible; }
        .bar { width: 4px; height: 10px; background: white; border-radius: 3px; animation: bounce 1s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { height: 10px; } 50% { height: 25px; } }

        @media (max-width: 850px) {
            .hamburger { display: block; }
            .browse-card {
                position: fixed; top: 0; left: 0; height: 100vh; width: 320px; z-index: 2000;
                transform: translateX(-105%); border-radius: 0 28px 28px 0;
                transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .browse-card.open { transform: translateX(0); }
            .player-card { width: 100%; }
            .overlay {
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.7); z-index: 1500; backdrop-filter: blur(4px);
            }
            .overlay.show { display: block; }
        }
    </style>
</head>
<body>

    <nav>
        <button class="hamburger" onclick="toggleMenu()">☰ Stations</button>
        <div style="font-weight: 700; font-size: 0.9rem; letter-spacing: 1px;">RADIO STATION</div>
    </nav>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header>
        <div class="logo">♪ Radio Station</div>
    </header>

    <div class="main-container">
        <div class="browse-card" id="sidebar">
            <h2 style="font-size: 1.5rem; margin-bottom: 10px;">Channels</h2>
            <div class="tabs">
                <div class="tab active" onclick="changeTab('Hindi')">Hindi</div>
                <div class="tab" onclick="changeTab('Bengali')">Bengali</div>
                <div class="tab" onclick="changeTab('News')">News</div>
            </div>
            <div class="station-list" id="listContainer"></div>
        </div>

        <div class="player-card" id="player">
            <div class="visualizer">
                <div style="width: 45px; height: 45px; background: #7c3aed; border-radius: 50%; border: 5px solid #0a0d16; z-index: 5;"></div>
            </div>

            <div class="playing-bars">
                <div class="bar"></div><div class="bar" style="animation-delay: 0.2s"></div><div class="bar" style="animation-delay: 0.4s"></div>
            </div>

            <div style="text-align: center; min-height: 80px;">
                <h3 id="curName" style="font-size: 1.6rem;">Ready to Play</h3>
                <p id="curFreq" style="font-size: 0.9rem; opacity: 0.7; margin-top: 8px;"></p>
            </div>

            <button onclick="togglePlay()" id="playBtn" style="width: 80px; height: 80px; border-radius: 50%; border: none; background: #fff; color: #7c3aed; font-size: 1.8rem; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">▶</button>

            <div class="volume-section">
                <svg class="vol-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" oninput="changeVolume(this.value)">
                <svg class="vol-icon" viewBox="0 0 24 24"><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </div>
            
            <div style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; opacity: 0.9;">
                <div style="width: 8px; height: 8px; background: white; border-radius: 50%;"></div>
                <span id="statTxt">Ready</span>
            </div>
        </div>
    </div>

    <audio id="radioAudio"></audio>

    <script>
        const STATIONS = [
            { name: 'Radio Mirchi', freq: '98.3 FM', cat: 'Hindi', url: 'https://eu8.fastcast4u.com/proxy/clyedupq/stream' },
            { name: 'Red FM', freq: '93.5 FM', cat: 'Hindi', url: 'https://stream-152.zeno.fm/q97eczydqrhvv' },
            { name: 'Radio City', freq: '91.1 FM', cat: 'Hindi', url: 'https://streams.radio.co/s8d06d0298/listen' },
            { name: 'Fever FM', freq: '104.0 FM', cat: 'Hindi', url: 'https://funasia.streamguys1.com/live9' },
            { name: 'Big FM', freq: '92.7 FM', cat: 'Hindi', url: 'https://streams.radio.co/s8d06d0298/listen' },
            { name: 'Bollywood Radio', freq: '95.5 FM', cat: 'Hindi', url: 'https://server.mixify.in/listen/bangla/radio.mp3' },
            { name: 'AIR Maitree', freq: 'Kolkata', cat: 'Bengali', url: 'https://airhlspush.pc.cdn.bitgravity.com/httppush/hlspbaudio245/hlspbaudio24564kbps.m3u8' },
            { name: 'FM Rainbow', freq: 'Kolkata', cat: 'Bengali', url: 'https://airhlspush.pc.cdn.bitgravity.com/httppush/hlspbaudio058/hlspbaudio05864kbps.m3u8' },
            { name: 'Ankora Radio', freq: 'Bengali Hits', cat: 'Bengali', url: 'https://stream-153.zeno.fm/xush70b1cbruv' },
            { name: '90s Bengali', freq: 'Retro Hits', cat: 'Bengali', url: 'http://stream.zeno.fm/2k6xfu1pvs8uv' },
            { name: 'Mixify Bangla', freq: 'Hits', cat: 'Bengali', url: 'https://server.mixify.in/listen/bangla/radio.mp3' }
        ];

        let curCat = 'Hindi', curIdx = -1, playing = false;
        const audio = document.getElementById('radioAudio');

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function changeTab(cat) {
            curCat = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText === cat));
            render();
        }

        function render() {
            const container = document.getElementById('listContainer');
            const filtered = STATIONS.filter(s => s.cat === curCat);
            container.innerHTML = filtered.map(s => {
                const i = STATIONS.indexOf(s);
                return `<div class="station-item ${i===curIdx?'active':''}" onclick="selectStation(${i})">
                    <div style="background:#0a0d16; padding:10px; border-radius:10px;">📻</div>
                    <div style="text-align:left">
                        <div style="font-weight:600; color:#fff">${s.name}</div>
                        <div style="font-size:0.75rem; color:var(--text-muted)">${s.freq}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function selectStation(i) {
            curIdx = i;
            audio.src = STATIONS[i].url;
            audio.play();
            playing = true;
            document.getElementById('curName').innerText = STATIONS[i].name;
            document.getElementById('curFreq').innerText = STATIONS[i].freq;
            if(window.innerWidth < 850) toggleMenu();
            render(); updateUI();
        }

        function togglePlay() {
            if(curIdx === -1) return;
            playing ? audio.pause() : audio.play();
            playing = !playing;
            updateUI();
        }

        function changeVolume(val) { audio.volume = val; }

        function updateUI() {
            document.getElementById('playBtn').innerText = playing ? '❚❚' : '▶';
            document.getElementById('statTxt').innerText = playing ? 'Live Streaming' : 'Paused';
            document.getElementById('player').classList.toggle('playing', playing);
        }

        render();
    </script>
</body>
</html>
